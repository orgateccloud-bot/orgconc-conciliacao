name: Deploy Orgconc

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: orgconc-react/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: orgconc-react

      - name: Build React
        run: npm run build
        working-directory: orgconc-react

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANTE: apenas o build do React — nunca a raiz do repo,
          # que contem codigo backend, migrations e .env.example.
          path: 'orgconc-react/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias do sistema (weasyprint)
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0

      - name: Instalar dependencias
        run: pip install -r requirements.txt || pip install fastapi uvicorn python-dotenv supabase PyJWT

      - name: Verificar sintaxe Python
        run: |
          python -m py_compile api/main.py
          echo "Sintaxe OK"

      - name: Executar testes
        run: python -m pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ORGCONC_AUTH_TOKEN: ${{ secrets.ORGCONC_AUTH_TOKEN }}
          ORGCONC_LLM_RETRY_BASE_DELAY: '0'

  deploy-backend:
    name: Deploy Railway (backend)
    runs-on: ubuntu-latest
    needs: [ test-backend ]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        run: railway up --service "${{ vars.RAILWAY_SERVICE }}" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Smoke test (health check)
        run: |
          echo "Aguardando deploy estabilizar..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_HEALTH_URL }}" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Health check OK (HTTP 200)"
              exit 0
            fi
            echo "Tentativa $i/30: HTTP $status — aguardando 10s"
            sleep 10
          done
          echo "Health check FALHOU apos 5 min"
          exit 1
