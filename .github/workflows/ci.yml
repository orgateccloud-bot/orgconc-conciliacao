name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias do sistema para weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Configurar .env de teste (sem credenciais reais)
        run: |
          echo "ANTHROPIC_API_KEY=sk-ant-test" >> $GITHUB_ENV
          echo "ORGCONC_AUTH_TOKEN=" >> $GITHUB_ENV
          echo "ORGCONC_CORS_ORIGINS=http://127.0.0.1:8765" >> $GITHUB_ENV

      - name: Rodar pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov=api --cov-report=term-missing --cov-fail-under=70

      - name: Verificar que .env NAO foi commitado
        run: |
          if git ls-files | grep -E "^\.env$"; then
            echo "ERRO: .env esta tracked no git!"
            exit 1
          fi

      - name: Lint basico - black --check (informativo, nao falha)
        continue-on-error: true
        run: |
          pip install black ruff
          black --check api/ tests/ || true
          ruff check api/ tests/ || true

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: pip-audit (vulnerabilidades em dependencias)
        run: pip-audit -r requirements.txt

      - name: bandit (analise estatica de seguranca)
        run: bandit -r api/ -ll

      - name: Verificar se nao ha credenciais hardcoded
        run: |
          ! grep -rE "(sk-ant-[a-zA-Z0-9_-]{20,})" --include="*.py" --include="*.html" --include="*.md" . || \
            (echo "ERRO: chave Anthropic encontrada no codigo!" && exit 1)
