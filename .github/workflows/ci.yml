name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancela runs anteriores no mesmo branch/PR (poupa minutos do GitHub Actions)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versao-sync:
    name: Versao sincronizada
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Conferir que VERSION = package.json.version
        run: |
          v_file=$(cat VERSION | tr -d '[:space:]')
          v_pkg=$(python -c "import json; print(json.load(open('orgconc-react/package.json'))['version'])")
          v_lock=$(python -c "import json; print(json.load(open('orgconc-react/package-lock.json'))['version'])")
          echo "VERSION=$v_file  package.json=$v_pkg  package-lock=$v_lock"
          if [ "$v_file" != "$v_pkg" ] || [ "$v_file" != "$v_lock" ]; then
            echo "ERRO: versoes divergentes. Use 'bump-my-version bump <part>' para sincronizar."
            exit 1
          fi

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Dependencias do sistema (weasyprint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 shared-mime-info

      - name: Instalar Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint obrigatorio)
        run: ruff check api/ tests/

      - name: Mypy strict em api/domain + api/usecases
        run: mypy api/domain api/usecases
        continue-on-error: true   # informativo ate gradual rampup

      - name: Pytest + coverage (min 70%)
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-fake"
          ORGCONC_CORS_ORIGINS: "http://127.0.0.1:8765"
          ORGCONC_JWT_SECRET: "ci-test-secret-with-at-least-32-chars-for-validation"
          ORGCONC_ENV: "development"
          # Forca skip de tests que dependem de DB real
          _ORGCONC_TESTS_DB_SKIP: "1"
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=api --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Verificar .env NAO commitado
        run: |
          if git ls-files | grep -E "^\.env$"; then
            echo "ERRO: .env esta tracked no git!"
            exit 1
          fi

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar tools de seguranca
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: pip-audit (vuln em dependencias)
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-w596-4wvx-j9j6 || true
        # `|| true` por ora — apertamos depois de saneadas as transitivas

      - name: bandit (SAST Python)
        run: bandit -r api/ -ll

      - name: Verificar credenciais Anthropic hardcoded
        run: |
          if grep -rE "sk-ant-[a-zA-Z0-9_-]{20,}" \
              --include="*.py" --include="*.html" --include="*.md" \
              --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "ERRO: chave Anthropic encontrada no codigo!"
            exit 1
          fi

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "table"

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: orgconc-react/package-lock.json

      - name: npm ci
        working-directory: orgconc-react
        run: npm ci

      - name: TypeScript type check
        working-directory: orgconc-react
        run: npm run typecheck

      - name: ESLint
        working-directory: orgconc-react
        run: npm run lint

      - name: Vitest (unit tests)
        working-directory: orgconc-react
        run: npm test

      - name: Vite build
        working-directory: orgconc-react
        run: npm run build

      - name: npm audit (high+critical)
        working-directory: orgconc-react
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: orgconc-react/package-lock.json

      - name: npm ci
        working-directory: orgconc-react
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('orgconc-react/package-lock.json') }}

      - name: Instalar Playwright browsers
        working-directory: orgconc-react
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Build app
        working-directory: orgconc-react
        run: npm run build

      - name: Rodar testes E2E
        working-directory: orgconc-react
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: orgconc-react/playwright-report/
          retention-days: 14
