name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: pytest + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-dev.txt', 'requirements-prod.txt') }}

      - name: Instalar dependencias do sistema para weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Configurar .env de teste (sem credenciais reais)
        run: |
          echo "ANTHROPIC_API_KEY=sk-ant-test" >> $GITHUB_ENV
          echo "ORGCONC_AUTH_TOKEN=" >> $GITHUB_ENV
          echo "ORGCONC_CORS_ORIGINS=http://127.0.0.1:8765" >> $GITHUB_ENV

      - name: Rodar pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov=api --cov-report=term-missing --cov-fail-under=80

      - name: Verificar que .env NAO foi commitado
        run: |
          if git ls-files | grep -E "^\.env$"; then
            echo "ERRO: .env esta tracked no git!"
            exit 1
          fi

      - name: Lint basico - black --check (informativo, nao falha)
        continue-on-error: true
        run: |
          pip install black ruff
          black --check api/ tests/ || true
          ruff check api/ tests/ || true

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt
          pip install pip-audit bandit semgrep

      - name: pip-audit (vulnerabilidades em dependencias)
        run: pip-audit -r requirements-prod.txt

      - name: bandit (analise estatica de seguranca)
        run: bandit -r api/ -ll

      - name: semgrep SAST
        run: semgrep --config=auto api/ --error --quiet || true

      - name: Verificar se nao ha credenciais hardcoded
        run: |
          ! grep -rE "(sk-ant-[a-zA-Z0-9_-]{20,})" --include="*.py" --include="*.html" --include="*.md" . || \
            (echo "ERRO: chave Anthropic encontrada no codigo!" && exit 1)

      - name: Verificar .env nao commitado
        run: |
          if git ls-files | grep -E "^\.env$"; then
            echo "ERRO: .env esta tracked no git!"
            exit 1
          fi

      - name: Trivy — varredura de seguranca de filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "table"

  frontend:
    name: React build + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: orgconc-react/package-lock.json
      - name: npm ci e build
        working-directory: orgconc-react
        run: |
          npm ci
          npm run build
      - name: TypeScript type check
        working-directory: orgconc-react
        run: npx tsc --noEmit
      - name: Vitest (unit tests)
        working-directory: orgconc-react
        run: npm run test:run
      - name: npm audit (vulnerabilidades high+critical)
        working-directory: orgconc-react
        run: npm audit --audit-level=high

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: orgconc-react/package-lock.json
      - name: npm ci
        working-directory: orgconc-react
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('orgconc-react/package-lock.json') }}
      - name: Instalar Playwright browsers
        working-directory: orgconc-react
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi
      - name: Build app
        working-directory: orgconc-react
        run: npm run build
      - name: Rodar testes E2E
        working-directory: orgconc-react
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: orgconc-react/playwright-report/
