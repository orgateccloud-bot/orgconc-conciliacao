# Atualizacoes automaticas de dependencias (fecha o gap "advisory escapou ate
# travar o CI" — ex.: a CVE do vitest). Agrupa por ecossistema para reduzir ruido.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/orgconc-react"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
