<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ORGATEC · Conciliação Bancária</title>
  <meta http-equiv="refresh" content="0; url=/app">
  <link rel="icon" href="/ui/logo.png" type="image/png">
  <link rel="canonical" href="/app">
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #F0F7FF;
      font-family: -apple-system, "Segoe UI", Inter, Roboto, sans-serif;
      color: #0F172A;
      display: flex; align-items: center; justify-content: center;
    }
    .box { text-align: center; padding: 32px; }
    .box a { color: #0052FF; font-weight: 600; }
    .spinner {
      width: 28px; height: 28px; margin: 12px auto;
      border: 3px solid #BFDBFE; border-top-color: #0052FF;
      border-radius: 50%; animation: sp 0.9s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" aria-hidden="true"></div>
    <p>Redirecionando para o dashboard…</p>
    <p><a href="/app">Clique aqui se a página não carregar automaticamente.</a></p>
  </div>
  <script src="/ui/js/redirect.js" defer></script>
</body>
</html>
