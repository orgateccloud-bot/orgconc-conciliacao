# Orgconc — Conciliacao Bancaria
# Uso interno com Supabase como banco de dados
# Para iniciar: docker compose up -d
# Para parar:   docker compose down
#
# Nota: o atributo `version:` foi removido (obsoleto no Compose v2).

services:

  # ── Redis (rate-limit distribuido + futura fila Arq) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: orgconc-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # exposto so para localhost
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - orgconc_redis:/data

  # ── Backend FastAPI + React SPA em /app/ ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orgconc-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # ── Anthropic ───────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ── Banco (Supabase pooler na :6543) ────────────────────────────────
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

      # ── Auth ────────────────────────────────────────────────────────────
      ORGCONC_JWT_SECRET: ${ORGCONC_JWT_SECRET:-}
      ORGCONC_JWT_TTL_MIN: ${ORGCONC_JWT_TTL_MIN:-120}
      ORGCONC_ADMIN_EMAIL: ${ORGCONC_ADMIN_EMAIL:-}
      ORGCONC_ADMIN_SENHA_HASH: ${ORGCONC_ADMIN_SENHA_HASH:-}

      # ── Ambiente ────────────────────────────────────────────────────────
      ORGCONC_ENV: ${ORGCONC_ENV:-development}

      # ── Redis (rate-limit distribuido) ──────────────────────────────────
      REDIS_URL: redis://redis:6379/0

      # ── Servidor / Logging ──────────────────────────────────────────────
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: ${WORKERS:-2}
      ORGCONC_LOG_LEVEL: ${ORGCONC_LOG_LEVEL:-INFO}
      ORGCONC_LOG_JSON: ${ORGCONC_LOG_JSON:-true}
      ORGCONC_MAX_UPLOAD_MB: ${ORGCONC_MAX_UPLOAD_MB:-10}
      ORGCONC_MAX_UPLOAD_TOTAL_MB: ${ORGCONC_MAX_UPLOAD_TOTAL_MB:-50}
      ORGCONC_DATA_DIR: /app/data

      # ── CORS ────────────────────────────────────────────────────────────
      ORGCONC_CORS_ORIGINS: ${ORGCONC_CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8000}

      # ── SERPRO ──────────────────────────────────────────────────────────
      ORGCONC_SERPRO_CLIENT_PATH: ${ORGCONC_SERPRO_CLIENT_PATH:-}
      ORGCONC_SERPRO_DEMO_TOKEN: ${ORGCONC_SERPRO_DEMO_TOKEN:-}
      ORGCONC_SERPRO_CONSUMER_KEY: ${ORGCONC_SERPRO_CONSUMER_KEY:-}
      ORGCONC_SERPRO_CONSUMER_SECRET: ${ORGCONC_SERPRO_CONSUMER_SECRET:-}
      ORGCONC_SERPRO_AUDIT_SALT: ${ORGCONC_SERPRO_AUDIT_SALT:-}

    volumes:
      - orgconc_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Worker Arq (consome a fila Redis) ────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orgconc-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: redis://redis:6379/0
      ORGCONC_LOG_JSON: ${ORGCONC_LOG_JSON:-true}
      ORGCONC_LOG_LEVEL: ${ORGCONC_LOG_LEVEL:-INFO}
      ORGCONC_DATA_DIR: /app/data
    volumes:
      - orgconc_data:/app/data
    command: ["arq", "api.workers.WorkerSettings"]

  # ── UI legada (opcional, deprecated) ─────────────────────────────────────
  # Serve apenas os HTMLs em static/. Pode ser removido — o React e servido
  # diretamente pela API em /app/.
  legacy-ui:
    image: nginx:alpine
    container_name: orgconc-legacy-ui
    restart: unless-stopped
    profiles: ["legacy"]   # so sobe com: docker compose --profile legacy up
    ports:
      - "8080:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  orgconc_data:
    driver: local
  orgconc_redis:
    driver: local
